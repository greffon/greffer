version: "3.8"
services:
  greffer:
    build: .
    image: &app app
    restart: unless-stopped
    networks:
      - internal
    # Run pending ops migrations BEFORE uvicorn binds so they can't race
    # with request handlers that touch $GREFFON_PATH. `&&` not `;`: a
    # non-zero exit from apply_ops_migrations refuses to start the server.
    # --workers 1 is a hard requirement (HLD #3 § Single-worker uvicorn
    # constraint) — multi-worker would spawn N copies of the background
    # tasks, each with its own token, fighting the manager.
    command:
      - sh
      - -c
      - |
        poetry run python -m app.cli apply_ops_migrations && \
        exec poetry run uvicorn --factory app.main:create_app \
          --host 0.0.0.0 --port 8000 --workers 1
    env_file: &envfile
      - env.env
    environment:
      # Feature #3 shipped dormant; flip it on here at the cutover moment.
      # Without this, the greffer would boot with the HTTP surface alive
      # but no register / monitor / CRL workers — the manager would never
      # see a cert handshake or instance-status callbacks.
      - GREFFER_WORKERS_ENABLED=true
    extra_hosts:
      - "greffon.io:host-gateway"
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared volume that the greffer's FastAPI controller writes
      # client.toml into (manager pushes via /api/controller/tunnel-config/
      # and via the cert-poll response on accept). The tunnel-sidecar
      # reads it through the same mount so rathole-client's file watcher
      # picks up changes. Always mounted so proxy-mode deployments
      # don't need a separate compose layer.
      - rathole-client-config:/config
  nginx:
    build: ./nginx
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - 8001:443
  # Tunnel-mode sidecar. Started only when the operator opts in via
  # `docker compose --profile tunnel up`. Proxy-mode greffers pay zero
  # cost — the container is never created.
  #
  # v3: rathole-client + dumb-init only. No agent.py, no python runtime,
  # no manager polling, no shared-secret token on disk. The greffer's
  # FastAPI controller writes client.toml on the shared volume in
  # response to manager pushes (POST /api/controller/tunnel-config/);
  # rathole-client picks up the change via its built-in file watcher.
  #
  # network_mode: host so rathole-client can reach the manager's
  # rathole-server out through the host's network. Note: this still
  # gives rathole-client access to host loopback services; operator
  # runbook recommends running the greffer host in a dedicated VM.
  tunnel-sidecar:
    build: ./tunnel-sidecar
    profiles: ["tunnel"]
    network_mode: host
    restart: unless-stopped
    depends_on:
      - greffer
    # rathole-client forwards inbound tunnel traffic to whatever host the
    # manager renders in client.toml (settings.GREFFER_API_LOCAL_HOST,
    # default ``host.docker.internal``). With ``network_mode: host`` on
    # Linux Docker Engine, ``host-gateway`` resolves to the docker bridge
    # gateway IP, from which the bridge port mappings of the greffer
    # nginx are reachable. Docker Desktop (macOS / Windows) provides the
    # same mapping out of the box; the entry is harmless there.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Read-only mount of the shared client.toml the greffer's
      # controller writes. Sidecar never writes here.
      - rathole-client-config:/config:ro
    healthcheck:
      test: ["CMD", "pgrep", "-f", "rathole"]
      interval: 15s
      timeout: 3s
      retries: 3
volumes:
  # Shared client.toml between greffer's FastAPI controller (writer)
  # and tunnel-sidecar's rathole-client (reader). Named volume keeps
  # it inside the docker-managed area; nothing on the host filesystem
  # to chmod.
  rathole-client-config:
networks:
  internal: {}
