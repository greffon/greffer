version: "3.8"
services:
  app:
    build: .
    image: &app app
    restart: unless-stopped
    command: ["poetry", "run", "python", "manage.py", "runserver", "0.0.0.0:8000"]
    env_file: &envfile
      - env.env
    ports:
      - "8001:8000"
    extra_hosts:
      - "greffon.io:host-gateway"
    volumes:
      - ./:/app
      - //var/run/docker.sock:/var/run/docker.sock