# greffer-cli compose template — single file, two modes via profiles.
#
# Rendered by `greffer up` into ~/.greffer/docker-compose.yml. The
# image-tag placeholder is interpolated at PyInstaller bundle time
# from cli/IMAGE_TAG (see HLD section "Image-tag bundling contract");
# in dev, main.py resolves it at runtime from the same file.
#
# Mode selection happens at `docker compose up` time, NOT at template-
# render time:
#   - Proxy mode:  docker compose up -d                 (no profile)
#   - Tunnel mode: docker compose --profile tunnel up -d
# The tunnel-sidecar service has `profiles: ["tunnel"]` so proxy
# operators pay zero cost — the container is never created.
#
# Mirrors the shape of the in-repo greffer/docker-compose.yml, with
# `build:` swapped for published `image:` references (operators have
# no source tree).
version: "3.8"

# Explicit project name. Without this, ``docker compose`` derives the
# project name from the compose file's parent directory — which is
# ``~/.greffer/`` in the default path. Compose rejects project names
# that don't start with a lowercase letter or digit, so the default
# `up` command would fail before creating any container. Pin it here
# so the file is runnable from the documented default location AND
# any operator-chosen --config-dir.
name: greffer

# Log rotation for the greffer's OWN containers (greffer-observability epic,
# Feature #3). Mirrors greffer/docker-compose.yml; the greffon INSTANCE
# containers get the same treatment via the greffer's create_compose injection.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  greffer:
    # Image refs match what .github/workflows/docker-publish.yml pushes:
    # Docker Hub (no registry prefix), repository names without the
    # "greffer-" prefix for tunnel-sidecar. IMAGE_TAG defaults to
    # "latest" because that's the only tag the publish workflow emits
    # today; release-infrastructure work will introduce per-version
    # tags and bump cli/IMAGE_TAG in lockstep with each cut.
    image: greffon/greffer:<TAG>
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal
    env_file:
      - env.env
    environment:
      # Critical: without this the greffer boots but never registers.
      # See HLD section "Current State" for why this is in the rendered
      # compose rather than relying on the service's default.
      - GREFFER_WORKERS_ENABLED=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Docker socket for cert install into the nginx sidecar.
      - /var/run/docker.sock:/var/run/docker.sock
      # Data dir aligns with GREFFON_PATH=/data in env.env.
      - greffon-data:/data
      # Shared client.toml between the greffer's FastAPI controller
      # (writer) and tunnel-sidecar's rathole-client (reader). Always
      # mounted so proxy-mode deployments don't need a separate compose
      # layer; the sidecar only starts when --profile tunnel is passed.
      - rathole-client-config:/config
    # Self-health visibility (Feature #3) — mirrors greffer/docker-compose.yml.
    # Targets /readyz so `docker compose ps` shows when the greffer is wedged;
    # NOT the restart trigger (plain compose does not act on `unhealthy` — the
    # in-process watchdog restarts on a sustained FATAL readyz). A greffer
    # pending acceptance is DEGRADED -> 200 -> healthy. The probe resolves the
    # token like create_app (GREFFER_TOKEN env, else the persisted file); a
    # missing token exits 0 so a healthy greffer is never shown perpetually-
    # unhealthy.
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,os;
          p=os.path.join(os.getenv('GREFFON_PATH','/data'),'.greffer-token');
          t=os.getenv('GREFFER_TOKEN') or
          (open(p).read().strip() if os.path.exists(p) else '');
          t and urllib.request.urlopen(urllib.request.Request(
          'http://localhost:8000/readyz',
          headers={'X-GREFFON-TOKEN': t}), timeout=4)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  nginx:
    image: greffon/greffer-nginx:<TAG>
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:443"

  # Tunnel-mode sidecar — only started when `docker compose --profile
  # tunnel up`. Proxy-mode operators never create this container. The
  # CLI passes `--profile tunnel` to `compose up` when env.env's
  # GREFFER_MODE=tunnel.
  #
  # rathole-client + dumb-init only. No agent.py, no python runtime,
  # no manager polling, no shared-secret token on disk. The greffer's
  # FastAPI controller writes client.toml on the shared volume in
  # response to manager pushes; rathole-client picks up the change
  # via its built-in file watcher.
  tunnel-sidecar:
    # NB: published as `greffon/tunnel-sidecar` (no `greffer-` prefix) —
    # matches the docker-publish.yml workflow's tag, not the sibling
    # services' naming. Don't rename without bumping the workflow.
    image: greffon/tunnel-sidecar:<TAG>
    profiles: ["tunnel"]
    network_mode: host
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - greffer
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Read-only mount of the shared client.toml the greffer's
      # controller writes. Sidecar never writes here.
      - rathole-client-config:/config:ro
    healthcheck:
      test: ["CMD", "pgrep", "-f", "rathole"]
      interval: 15s
      timeout: 3s
      retries: 3

networks:
  internal: {}

volumes:
  greffon-data:
  # Shared client.toml — see the greffer service's volumes block.
  rathole-client-config:
