name: cli-release

# Builds per-arch greffer CLI binaries with PyInstaller and publishes
# them to a GitHub Release, plus a `sha256sums.txt`. Triggered by
# pushing a `cli-vX.Y.Z` tag — version comes from the tag, NOT from
# cli/pyproject.toml (the pyproject version is for the Python package
# distribution if we ever publish one; the operator-facing binary is
# the tag).
#
# Operator install path:
#   curl -sSL https://greffon.io/install.sh | sh                 (linux + macOS)
#   iwr -useb https://greffon.io/install.ps1 | iex               (Windows; see
#                                                                 greffer-windows-support epic)
# which downloads the matching `greffer-{os}-{arch}{.exe?}` asset, verifies
# sha256, and execs the binary. See landing-page's install.sh route
# and the install.ps1 route (added by the Windows epic).

on:
  push:
    tags:
      - 'cli-v*'
  # PR validation: build all four arches and smoke-test --help when
  # any CLI file changes. The publish job's `if:` skips the actual
  # Release creation, so PR runs are zero-risk. Catches "the tag
  # build is broken" issues BEFORE we tag.
  pull_request:
    paths:
      - 'cli/**'
      - '.github/workflows/cli-release.yml'
  # Allow manual dry-runs without publishing — useful before cutting
  # a real tag to confirm the matrix builds clean.
  workflow_dispatch: {}

permissions:
  # Default scope is read-only so the build jobs — which execute
  # third-party code via `poetry install` and `pytest` — can't
  # mutate the repo or cut releases. The publish job overrides
  # this with `contents: write` for its single use case (uploading
  # Release assets). Least-privilege.
  contents: read

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux binaries build INSIDE a manylinux2014 container
          # (glibc 2.17), NOT on the bare ubuntu-22.04 runner (glibc
          # 2.35). PyInstaller links the bundled libpython — and every
          # other shared lib it pulls in — against the BUILD host's
          # glibc, and glibc is backward- but NOT forward-compatible: a
          # 2.35 build aborts at startup on anything older with
          # `version GLIBC_2.35 not found`. Building at 2.17 gives the
          # lowest practical floor, so ONE binary per arch runs on
          # everything from CentOS 7 / Amazon Linux 2 up to the latest
          # Ubuntu (no need to ship multiple glibc variants — backward
          # compat means the lowest floor covers all higher ones).
          #
          # Two consequences drive the `image`/`pbs_url` matrix fields,
          # both handled in the "Build binary (Linux)" step below:
          #   1. node20 (the v4 actions' runtime) needs glibc >= 2.28,
          #      so manylinux2014 CANNOT be a job `container:`. Instead
          #      checkout/upload run on the host and only the build runs
          #      via `docker run` inside the container.
          #   2. manylinux2014 is CentOS-7 based and has no shared-
          #      libpython python3.11 (PyInstaller needs a SHARED
          #      libpython). We fetch a relocatable one from
          #      python-build-standalone, pinned for reproducibility —
          #      bump the tag/version periodically.
          - target: linux-x86_64
            runner: ubuntu-22.04
            # Pinned by DIGEST, not tag — this image builds the shipped
            # binary, so it's part of the artifact's supply chain (the PBS
            # interpreter below is sha256-pinned for the same reason).
            # Tag at pin time: manylinux2014_x86_64 (glibc 2.17). Bump
            # deliberately alongside pbs_url/pbs_sha256.
            image: quay.io/pypa/manylinux2014_x86_64@sha256:298eccaea20b9e9223dcfbd6af48743dce2dd3dd92ede4aff44e7af2e919db86
            pbs_url: https://github.com/astral-sh/python-build-standalone/releases/download/20260602/cpython-3.11.15+20260602-x86_64-unknown-linux-gnu-install_only.tar.gz
            # Content hash of the asset above (computed at pin time, NOT a
            # build-time sidecar — the release publishes none). Bump in
            # lockstep with pbs_url.
            pbs_sha256: 1702759f4b44d71d307bc876ef913495461790c9fcfa20d1f67270b22170cd09
          - target: linux-arm64
            # Native arm64 runner. If ubuntu-22.04-arm is unavailable in
            # this org's plan, fall back to ubuntu-22.04 + QEMU — but
            # that path is ~10x slower; prefer native.
            runner: ubuntu-22.04-arm
            image: quay.io/pypa/manylinux2014_aarch64@sha256:e3ad90ea5f951aff23881f76b790b24abc154e7a1c3ee5107731c71f9cf5ca28
            pbs_url: https://github.com/astral-sh/python-build-standalone/releases/download/20260602/cpython-3.11.15+20260602-aarch64-unknown-linux-gnu-install_only.tar.gz
            pbs_sha256: 408474860874575864d3d6bcf44c344b6bc558730976131c9e4a9138098596f2
          - target: darwin-x86_64
            # macos-13 was retired in late 2025 per GitHub's runner-images
            # deprecation schedule; macos-15-intel is the current label
            # for Intel macOS jobs. Apple Silicon jobs (darwin-arm64) use
            # the unsuffixed macos-N label since those runners are
            # arm64-native.
            runner: macos-15-intel
          - target: darwin-arm64
            runner: macos-14
          - target: windows-x86_64
            # windows-latest runners include Python 3.11 via setup-python,
            # PyInstaller works the same as on Linux/macOS, and they ship
            # Git Bash by default — which is why every shell step below
            # uses `shell: bash` so the same command works across all
            # three OS families. Binary suffix differs: only Windows
            # gets `.exe`. See cli/.github/workflows/cli-release.yml docs.
            runner: windows-latest

    defaults:
      run:
        working-directory: cli
        # All steps below run under Git Bash (windows-latest) or bash
        # (linux/macOS). Without this, windows-latest defaults to
        # PowerShell and the if/elif/else shell logic breaks.
        shell: bash

    steps:
      - uses: actions/checkout@v4

      # ── Linux: build inside manylinux2014 (glibc 2.17) via `docker run` ──
      # node20 (the v4 actions' runtime) can't run in a 2.17 container, so
      # checkout (above) and packaging/upload (below) stay on the host and
      # only the build runs in the container. The bind-mounted repo means
      # the produced cli/dist/ lands back on the host for the shared
      # smoke/package/upload steps. Those dist/ files end up root-owned
      # (the container runs as root) but are world-readable, so host steps
      # that only READ them are fine. python-build-standalone supplies the
      # shared libpython that CentOS-7-based manylinux2014 lacks; it is
      # relocatable, so we unpack it in an isolated dir to avoid colliding
      # with the image's own static /opt/python.
      - name: Build binary (Linux / manylinux2014)
        if: ${{ matrix.image }}
        env:
          IMAGE: ${{ matrix.image }}
          PBS_URL: ${{ matrix.pbs_url }}
          PBS_SHA256: ${{ matrix.pbs_sha256 }}
        run: |
          docker run --rm -e PBS_URL -e PBS_SHA256 \
            -v "$GITHUB_WORKSPACE:/io" -w /io/cli \
            "$IMAGE" bash -euo pipefail -c '
              # Fetch the relocatable interpreter, retrying transient
              # network failures. manylinux2014 ships curl 7.29, which
              # lacks --retry-all-errors, so use a portable loop. Fail
              # explicitly when all attempts are exhausted (do not rely on
              # a later step tripping over the missing file).
              for attempt in 1 2 3 4 5; do
                curl -fSL --connect-timeout 15 "$PBS_URL" -o /tmp/py.tgz && break
                echo "pbs download attempt $attempt failed" >&2
                [ "$attempt" -lt 5 ] && sleep $((attempt * 3))
              done
              [ -f /tmp/py.tgz ] || { echo "::error::PBS download failed after 5 attempts"; exit 1; }
              # Integrity: verify against the hard-pinned content hash
              # before trusting the archive. Aborts if it ever changes.
              echo "$PBS_SHA256  /tmp/py.tgz" | sha256sum -c -
              mkdir -p /opt/pbs && tar xzf /tmp/py.tgz -C /opt/pbs
              export PATH=/opt/pbs/python/bin:$PATH
              python -m pip install --no-cache-dir "poetry==1.8.5"
              poetry env use "$(command -v python3.11)"
              poetry install --no-interaction --with release
              poetry run pytest -q
              poetry run pyinstaller --clean --noconfirm greffer.spec
              # Static regression guard: fail loudly if any bundled lib
              # references a glibc symbol newer than our 2.17 floor (e.g. a
              # future dep that drags in a higher baseline). Complements
              # the runtime boot test below. Assert we actually inspected
              # something, so an empty result cannot pass as "clean".
              syms=$(find dist/greffer -name "*.so*" -exec objdump -T {} \; 2>/dev/null \
                     | grep -oE "GLIBC_[0-9]+\.[0-9]+")
              [ -n "$syms" ] || { echo "::error::no glibc symbols inspected — floor guard ineffective"; exit 1; }
              max=$(printf "%s\nGLIBC_2.17\n" "$syms" | sort -V | tail -1)
              echo "max bundled glibc symbol: $max"
              [ "$max" = "GLIBC_2.17" ] || { echo "::error::glibc floor regressed to $max (expected <= 2.17)"; exit 1; }
              # Everything the root container created on the bind mount
              # lives under cli/ (dist/, build/, __pycache__/, *.egg-info/,
              # .pytest_cache/) and is root-owned. Hand that subtree back
              # to the host user (uid/gid derived from the mount itself)
              # so: (a) the host-side Package step can write the tarball
              # inside dist/, and (b) no root-owned leftovers break
              # workspace cleanup on reused (self-hosted) runners. Scope to
              # cli/ — it always exists (the working dir) and avoids the
              # repo .git/ tree, which checkout already owns.
              chown -R "$(stat -c %u /io):$(stat -c %g /io)" /io/cli
            '

      # ── macOS / Windows: build natively on the runner ──
      - name: Set up Python (host runners)
        if: ${{ !matrix.image }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        # Pin Poetry to match the docker-publish.yml workflow so the CI
        # environments don't drift across the two release paths. `python
        # -m pip` (not bare `pip`) to bind to the interpreter set up above.
        if: ${{ !matrix.image }}
        run: python -m pip install --no-cache-dir "poetry==1.8.5"

      - name: Install dependencies (incl. release group)
        # `--with release` pulls pyinstaller; main + dev groups give us
        # the runtime deps + tests we run below.
        if: ${{ !matrix.image }}
        run: poetry install --no-interaction --with release

      - name: Run unit tests
        # Don't ship a binary built off a broken commit. The unit suite
        # runs in <1s; cheap insurance against tag-and-pray. (Linux runs
        # the same suite inside the container step above.)
        if: ${{ !matrix.image }}
        run: poetry run pytest -q

      - name: Build binary with PyInstaller
        if: ${{ !matrix.image }}
        run: poetry run pyinstaller --clean --noconfirm greffer.spec

      - name: Smoke-test the built binary
        # macOS / Windows only — the Linux legs get their `--help` check
        # from the dedicated glibc-2.17 boot test below (which exercises
        # the real floor, not the host's 2.35). `--help` exercises Typer's
        # command tree without needing docker, catching missing-import
        # bugs that only surface on the frozen bundle (e.g. a click
        # submodule absent from hiddenimports in greffer.spec). The `.exe`
        # suffix only exists on Windows. Onedir output is a directory; the
        # launcher lives at dist/greffer/greffer (greffer.exe on Windows).
        if: ${{ !matrix.image }}
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./dist/greffer/greffer.exe --help
          else
            ./dist/greffer/greffer --help
          fi

      - name: Verify the binary boots on glibc 2.17
        if: ${{ matrix.image }}
        env:
          IMAGE: ${{ matrix.image }}
        # The build step proves the symbol floor statically; this proves
        # it at runtime on the OLDEST supported glibc. We reuse the
        # manylinux2014 image (glibc 2.17) rather than Docker Hub's
        # centos:7: it is already pulled, lives on quay (no anonymous
        # pull-rate-limit that could flake a release), is multi-arch, and
        # is digest-pinned. A clean `docker run` with no build PATH/env
        # exercises only the self-contained bundle — if greffer starts
        # here it starts on everything above (Amazon Linux 2, RHEL/Rocky/
        # Alma 8 & 9, Ubuntu 18.04+, ...).
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE/cli/dist:/d:ro" \
            "$IMAGE" /d/greffer/greffer --help

      - name: Package onedir bundle as a tarball
        # Onedir ships a directory (launcher + _internal/), so the
        # release asset is a tarball, not a bare binary. tar -czf is
        # uniform across all three OS families — Git Bash on
        # windows-latest provides GNU/bsdtar, and `-C dist greffer`
        # archives the bundle dir with a stable top-level `greffer/`
        # entry the installers extract. The Windows launcher
        # (greffer.exe) is preserved inside the tarball with its
        # extension intact.
        run: |
          tar -czf "dist/greffer-${{ matrix.target }}.tar.gz" -C dist greffer

      - name: Compute per-file sha256
        # Emits the local hash for debugging in the Actions log; the
        # publish job aggregates all targets into sha256sums.txt.
        # macOS ships shasum (Perl) only; Linux + Git-Bash-on-Windows
        # ship sha256sum.
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/greffer-${{ matrix.target }}.tar.gz"
          else
            shasum -a 256 "dist/greffer-${{ matrix.target }}.tar.gz"
          fi

      - name: Upload bundle artifact
        # Uniform asset name across all OSes now that everything ships
        # as a .tar.gz — no Windows/.exe special-case.
        uses: actions/upload-artifact@v4
        with:
          name: greffer-${{ matrix.target }}
          path: cli/dist/greffer-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 14

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-22.04
    # Skip the publish step on workflow_dispatch dry-runs and on any
    # invocation that didn't actually push a tag (defensive — the
    # `on:` filter already excludes those, but workflow_dispatch can
    # be fired from any ref).
    if: |
      github.event_name == 'push'
      && startsWith(github.ref, 'refs/tags/cli-v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all per-target artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          # All four jobs upload under names matching `greffer-*`.
          pattern: greffer-*
          merge-multiple: true

      - name: Verify all target artifacts are present
        # `needs: build` already blocks a partial release (any failed leg
        # fails the build job and skips publish), but assert the exact
        # expected set so artifact-naming drift can't silently ship a
        # subset. Keep this list in sync with the build matrix.
        working-directory: artifacts
        run: |
          for t in linux-x86_64 linux-arm64 darwin-x86_64 darwin-arm64 windows-x86_64; do
            [ -f "greffer-$t.tar.gz" ] || { echo "::error::missing release artifact greffer-$t.tar.gz"; exit 1; }
          done

      - name: Generate sha256sums.txt
        # Format matches the convention used by curl|sh install
        # scripts everywhere: `<sha256>  <filename>` (two spaces).
        # The install.sh in landing-page parses this exact format.
        working-directory: artifacts
        run: |
          sha256sum greffer-* > sha256sums.txt
          cat sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Tag drives the release name + the install.sh `latest`
          # lookup. Body is intentionally minimal — the changelog
          # lives in cli/CHANGELOG.md (separate doc) once we have
          # multiple releases to differentiate.
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            artifacts/greffer-*
            artifacts/sha256sums.txt
