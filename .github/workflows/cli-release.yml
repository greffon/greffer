name: cli-release

# Builds per-arch greffer CLI binaries with PyInstaller and publishes
# them to a GitHub Release, plus a `sha256sums.txt`. Triggered by
# pushing a `cli-vX.Y.Z` tag — version comes from the tag, NOT from
# cli/pyproject.toml (the pyproject version is for the Python package
# distribution if we ever publish one; the operator-facing binary is
# the tag).
#
# Operator install path:
#   curl -sSL https://greffon.io/install.sh | sh                 (linux + macOS)
#   iwr -useb https://greffon.io/install.ps1 | iex               (Windows; see
#                                                                 greffer-windows-support epic)
# which downloads the matching `greffer-{os}-{arch}{.exe?}` asset, verifies
# sha256, and execs the binary. See landing-page's install.sh route
# and the install.ps1 route (added by the Windows epic).

on:
  push:
    tags:
      - 'cli-v*'
  # PR validation: build all four arches and smoke-test --help when
  # any CLI file changes. The publish job's `if:` skips the actual
  # Release creation, so PR runs are zero-risk. Catches "the tag
  # build is broken" issues BEFORE we tag.
  pull_request:
    paths:
      - 'cli/**'
      - '.github/workflows/cli-release.yml'
  # Allow manual dry-runs without publishing — useful before cutting
  # a real tag to confirm the matrix builds clean.
  workflow_dispatch: {}

permissions:
  # Default scope is read-only so the build jobs — which execute
  # third-party code via `poetry install` and `pytest` — can't
  # mutate the repo or cut releases. The publish job overrides
  # this with `contents: write` for its single use case (uploading
  # Release assets). Least-privilege.
  contents: read

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    # Undefined for the macOS/Windows entries → empty string → GitHub
    # runs those jobs directly on the runner. Set to a manylinux image
    # for the two Linux targets so their binaries get a glibc 2.28 floor
    # instead of the runner's 2.35. See the matrix comment above.
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux binaries build INSIDE a manylinux_2_28 container
          # (glibc 2.28), NOT on the bare ubuntu-22.04 runner (glibc
          # 2.35). PyInstaller links the bundled libpython against the
          # BUILD host's glibc, and glibc is backward- but NOT forward-
          # compatible: a 2.35 build aborts at startup on anything older
          # (RHEL/Rocky/Alma 8 & 9, Ubuntu 20.04, Debian 11, ...) with
          # `version GLIBC_2.35 not found`. manylinux_2_28 is the lowest
          # glibc baseline that still satisfies node20 (which the v4
          # actions run on), so it works as a plain job `container:` with
          # no extra plumbing. Covers every currently-supported distro;
          # only CentOS 7 / Amazon Linux 2 (glibc < 2.28, both EOL) fall
          # outside — those would need manylinux2014 + a docker-run rework.
          - target: linux-x86_64
            runner: ubuntu-22.04
            container: quay.io/pypa/manylinux_2_28_x86_64
          - target: linux-arm64
            # Native arm64 runner; the build runs in the aarch64
            # manylinux container. If ubuntu-22.04-arm is unavailable in
            # this org's plan, fall back to ubuntu-22.04 + QEMU — but
            # that path is ~10x slower and produces emulated artifacts;
            # prefer native.
            runner: ubuntu-22.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
          - target: darwin-x86_64
            # macos-13 was retired in late 2025 per GitHub's runner-images
            # deprecation schedule; macos-15-intel is the current label
            # for Intel macOS jobs. Apple Silicon jobs (darwin-arm64) use
            # the unsuffixed macos-N label since those runners are
            # arm64-native.
            runner: macos-15-intel
          - target: darwin-arm64
            runner: macos-14
          - target: windows-x86_64
            # windows-latest runners include Python 3.11 via setup-python,
            # PyInstaller works the same as on Linux/macOS, and they ship
            # Git Bash by default — which is why every shell step below
            # uses `shell: bash` so the same command works across all
            # three OS families. Binary suffix differs: only Windows
            # gets `.exe`. See cli/.github/workflows/cli-release.yml docs.
            runner: windows-latest

    defaults:
      run:
        working-directory: cli
        # All steps below run under Git Bash (windows-latest) or bash
        # (linux/macOS). Without this, windows-latest defaults to
        # PowerShell and the if/elif/else shell logic breaks.
        shell: bash

    steps:
      - uses: actions/checkout@v4

      # macOS / Windows: provision Python the normal way.
      - name: Set up Python (host runners)
        if: ${{ !matrix.container }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # manylinux containers ship CPython under /opt/python, but those
      # builds are STATIC (Py_ENABLE_SHARED=0, LDLIBRARY=libpython3.11.a)
      # and PyInstaller requires a SHARED libpython to bundle. The
      # AlmaLinux 8 base provides a shared-libpython python3.11 via dnf
      # (installs /usr/lib64/libpython3.11.so.1.0); python3.11-pip is a
      # separate package — the interpreter ships without pip. We expose
      # /usr/bin/python3.11 as `python`/`pip` ahead of the static
      # /opt/python shims in /usr/local/bin by prepending to PATH.
      - name: Set up Python (manylinux container)
        if: ${{ matrix.container }}
        run: |
          dnf install -y python3.11 python3.11-devel python3.11-pip
          mkdir -p /opt/greffer-py/bin
          ln -sf /usr/bin/python3.11 /opt/greffer-py/bin/python
          ln -sf /usr/bin/python3.11 /opt/greffer-py/bin/python3
          echo /opt/greffer-py/bin >> "$GITHUB_PATH"

      - name: Install Poetry
        # Pin Poetry to match the docker-publish.yml workflow so the
        # CI environments don't drift across the two release paths.
        # `python -m pip` (not bare `pip`) so this resolves to the
        # interpreter selected above on every platform — including the
        # container, where bare `pip` would hit the static /opt/python.
        run: python -m pip install --no-cache-dir "poetry==1.8.5"

      - name: Pin Poetry's venv to the shared interpreter (container)
        if: ${{ matrix.container }}
        # Force the project venv onto the shared-libpython python3.11 so
        # `poetry run pyinstaller` finds libpython3.11.so to bundle.
        # Without this, Poetry could resolve the static /opt/python
        # interpreter and the PyInstaller build would fail.
        run: poetry env use "$(command -v python)"

      - name: Install dependencies (incl. release group)
        # `--with release` pulls pyinstaller; main + dev groups give
        # us the runtime deps + tests we run in the smoke-check step.
        run: poetry install --no-interaction --with release

      - name: Run unit tests
        # Don't ship a binary built off a broken commit. The unit
        # suite runs in <1s; cheap insurance against tag-and-pray.
        run: poetry run pytest -q

      - name: Build binary with PyInstaller
        run: poetry run pyinstaller --clean --noconfirm greffer.spec

      - name: Smoke-test the built binary
        # `--help` exercises Typer's command tree without needing
        # docker. Catches missing-import bugs that only surface on
        # the frozen bundle (e.g. a click submodule we forgot to
        # add to hiddenimports in greffer.spec). The `.exe` suffix
        # only exists on Windows; the conditional keeps one step for
        # all platforms instead of two with matrix-conditional `if:`.
        # Onedir output is a directory; the launcher lives one level
        # down at dist/greffer/greffer (greffer.exe on Windows).
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./dist/greffer/greffer.exe --help
          else
            ./dist/greffer/greffer --help
          fi

      - name: Package onedir bundle as a tarball
        # Onedir ships a directory (launcher + _internal/), so the
        # release asset is a tarball, not a bare binary. tar -czf is
        # uniform across all three OS families — Git Bash on
        # windows-latest provides GNU/bsdtar, and `-C dist greffer`
        # archives the bundle dir with a stable top-level `greffer/`
        # entry the installers extract. The Windows launcher
        # (greffer.exe) is preserved inside the tarball with its
        # extension intact.
        run: |
          tar -czf "dist/greffer-${{ matrix.target }}.tar.gz" -C dist greffer

      - name: Compute per-file sha256
        # Emits the local hash for debugging in the Actions log; the
        # publish job aggregates all targets into sha256sums.txt.
        # macOS ships shasum (Perl) only; Linux + Git-Bash-on-Windows
        # ship sha256sum.
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/greffer-${{ matrix.target }}.tar.gz"
          else
            shasum -a 256 "dist/greffer-${{ matrix.target }}.tar.gz"
          fi

      - name: Upload bundle artifact
        # Uniform asset name across all OSes now that everything ships
        # as a .tar.gz — no Windows/.exe special-case.
        uses: actions/upload-artifact@v4
        with:
          name: greffer-${{ matrix.target }}
          path: cli/dist/greffer-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 14

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-22.04
    # Skip the publish step on workflow_dispatch dry-runs and on any
    # invocation that didn't actually push a tag (defensive — the
    # `on:` filter already excludes those, but workflow_dispatch can
    # be fired from any ref).
    if: |
      github.event_name == 'push'
      && startsWith(github.ref, 'refs/tags/cli-v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all per-target artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          # All four jobs upload under names matching `greffer-*`.
          pattern: greffer-*
          merge-multiple: true

      - name: Generate sha256sums.txt
        # Format matches the convention used by curl|sh install
        # scripts everywhere: `<sha256>  <filename>` (two spaces).
        # The install.sh in landing-page parses this exact format.
        working-directory: artifacts
        run: |
          sha256sum greffer-* > sha256sums.txt
          cat sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Tag drives the release name + the install.sh `latest`
          # lookup. Body is intentionally minimal — the changelog
          # lives in cli/CHANGELOG.md (separate doc) once we have
          # multiple releases to differentiate.
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            artifacts/greffer-*
            artifacts/sha256sums.txt
